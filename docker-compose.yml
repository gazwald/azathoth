---
networks:
  isolated:
    internal: true
  public:

services:
  nginx:
    container_name: nginx
    image: registry.poppet.io/dockerhub/nginx:1.27.0-alpine
    ports:
      - 80:80
      - 9119:9119
    restart: always
    volumes:
      - ./config/nginx:/etc/nginx/conf.d
    networks:
      - public
      - isolated
    links:
      - openwebui
      - hermes

  openwebui:
    container_name: openwebui
    image: registry.poppet.io/ghcr/open-webui/open-webui:v0.9.5
    volumes:
      - ./data/open-webui:/app/backend/data
    ports:
      - 3000:8080
    depends_on:
      - ollama
      - tika
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      OPENAI_API_BASE_URL: "http://hermes:8642/v1"
      OPENAI_API_KEY: "52d8b87d59b7a6b35a2dd25ccc4c2b0fcb6c0b8e"
      RAG_OLLAMA_API_KEY: "ollama"
      RAG_OLLAMA_BASE_URL: "http://ollama:11434"
      RAG_EMBEDDING_ENGINE: "ollama"
      RAG_EMBEDDING_MODEL: "nomic-embed-text:v1.5"
      CONTENT_EXTRACTION_ENGINE: "tika"
      TIKA_SERVER_URL: "http://tika:9998"
    restart: unless-stopped
    networks:
      - isolated

  tika:
    container_name: tika
    image: registry.poppet.io/dockerhub/apache/tika:3.3.0.0-full
    ports:
      - 9998:9998
    restart: unless-stopped
    networks:
      - isolated

  hermes:
    container_name: hermes
    image: registry.poppet.io/dockerhub/nousresearch/hermes-agent:v2026.5.7
    volumes:
      - ./data/hermes-agent:/opt/data
    ports:
      - 8642:8642 # Agent
      - 9119:9119 # Dashboad
    depends_on:
      - ollama
      - openviking
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_KEY: "52d8b87d59b7a6b35a2dd25ccc4c2b0fcb6c0b8e"
      API_SERVER_CORS_ORIGINS: "*"
      HERMES_DASHBOARD: 1
      GATEWAY_ALLOW_ALL_USERS: "true" # Global allow-all (use with extreme caution)
    restart: unless-stopped
    networks:
      - isolated
    command: gateway run
    shm_size: "4g"


  ollama:
    container_name: ollama
    image: registry.poppet.io/dockerhub/ollama/ollama:0.22.1-rocm
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      OLLAMA_CONTEXT_LENGTH: 262144
      OLLAMA_FLASH_ATTENTION: 1
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_KV_CACHE_TYPE: q8_0
      OLLAMA_NO_CLOUD: 1
      OLLAMA_MAX_LOADED_MODELS: 2
    restart: unless-stopped
    networks:
     - isolated
     - public

  openviking:
    image: registry.poppet.io/ghcr/volcengine/openviking:v0.3.16
    container_name: openviking
    # Direct access to individual services (optional — caddy:1934 is the
    # recommended single entry point). Comment these out once Caddy is your
    # only ingress.
    ports:
      - "1933:1933"
      - "8020:8020"
    volumes:
      - ./data/openviking:/app/.openviking
    depends_on:
      - ollama
    environment:
      GATEWAY_ALLOW_ALL_USERS: "true"
      OPENVIKING_WITH_BOT: 0
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - isolated
